<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- Lien vers la feuille de style CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Import des polices Google (Poppins et Material Symbols) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <!-- Chargement du script JavaScript en mode différé -->
    <script src="app.js" defer></script>
</head>
<body>
    <!-- Conteneur principal de l'application -->
    <main class="main-container">
        <!-- En-tête avec barre de recherche -->
        <header class="input-container">
            <input type="text" class="city-input" placeholder="Search city">
            <button class="search-btn">
                <span class="material-symbols-outlined">search</span> 
            </button>
        </header>

        <!-- Section affichant les informations météo (cachée par défaut) -->
        <section class="weather-info" style="display: none;">
            <!-- Container pour la localisation et la date -->
            <div class="location-date-container">
                <div class="location">
                    <span class="material-symbols-outlined">location_on</span>
                    <h4 class="country-txt">Jakarta</h4>
                </div>
                <h5 class="current-date-txt regular-txt">Wed, 07 Aug</h5>
            </div>

            <!-- Résumé météo avec icône et température -->
            <div class="weather-summary-container">
                <img src="weather/clouds.svg" class="weather-summary-img">
                <div class="weather-summary-info">
                    <h2 class="temp-txt">29 °C</h2>
                    <h4 class="condition-txt regular-txt">Clouds</h4>
                </div>
            </div>

            <!-- Container pour les prévisions des prochains jours -->
            <div class="forecast-items-container">
                </div>
        </section>

        <!-- Section de chargement avec animation (cachée par défaut) -->
        <section class="loading-section section-message" style="display: none;">
            <div class="loader-wrapper">
                <div class="cloud">
                    <div class="rain-container" id="rainContainer"></div>
                </div>
                <div class="loading-text">Loading</div>
            </div>
        </section>

        <!-- Section d'accueil invitant à rechercher une ville -->
        <section class="search-city section-message">
            <img src="messages/search-city.png">
            <div>
                <h1>Search City</h1>
                <h4 class="regular-txt">Find out temperature, weather conditions and more...</h4>
            </div>
        </section>

        <!-- Section d'erreur quand la ville n'est pas trouvée (cachée par défaut) -->
        <section class="not-found section-message" style="display: none;">
            <img src="messages/not-found.png">
            <div>
                <h1>City Not Found</h1>
                <h4 class="regular-txt">Please try searching for another city.</h4>
            </div>
        </section>
    </main>
</body>
</html>
